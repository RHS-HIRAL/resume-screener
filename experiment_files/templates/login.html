<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Resume Screener</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body style="display: flex; align-items: center; justify-content: center; background: var(--bg-dark);">
    <div class="card glass-panel"
        style="width: 100%; max-width: 400px; padding: 2.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
        <div class="brand" style="justify-content: center; margin-bottom: 2rem;">
            <i class="fa-solid fa-magnifying-glass-chart"></i>
            <span>Screener AI</span>
        </div>

        <h2 style="text-align: center; margin-bottom: 0.5rem; font-size: 1.5rem;">Welcome Back</h2>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem;">Please
            login to your internal account</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div
            style="padding: 0.8rem; border-radius: 8px; margin-bottom: 1.5rem; background: rgba(248, 113, 113, 0.1); border: 1px solid var(--accent-rose); color: var(--accent-rose); font-size: 0.85rem;">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="post">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login System</button>
        </form>

        <div style="margin-top: 2rem; text-align: center; font-size: 0.85rem; color: var(--text-secondary);">
            Don't have an account? <a href="{{ url_for('register') }}"
                style="color: var(--accent-indigo); text-decoration: none; font-weight: 600;">Register Here</a>
        </div>
    </div>
</body>

</html>
